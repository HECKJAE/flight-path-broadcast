<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>&#26041;&#20301;&#22280;&#39134;&#34892;&#36335;&#24452;&#25773;&#25253;&#22120; Demo</title>
  <style>
    :root{--bg:#f4f7f8;--panel:#fff;--ink:#162024;--muted:#63737a;--line:#d7e0e4;--accent:#176b87;--active:#fff1b8;--danger:#b3261e}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif}main{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:24px 0 36px}header{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;margin-bottom:18px}h1{margin:0 0 6px;font-size:28px;line-height:1.2;letter-spacing:0}.sub{margin:0;color:var(--muted);font-size:14px}.layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:16px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(25,43,51,.08)}.controls{padding:16px;position:sticky;top:16px}.field{display:grid;gap:7px;margin-bottom:14px}label{font-size:13px;color:var(--muted)}input,select{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px 11px;font:inherit;background:#fff;color:var(--ink)}.button-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}button{border:0;border-radius:6px;padding:11px 12px;font:inherit;font-weight:700;cursor:pointer;background:#e8eef1;color:var(--ink)}button.primary{background:var(--accent);color:#fff}button.danger{background:#f7dfdc;color:var(--danger)}button:disabled{cursor:not-allowed;opacity:.55}.status{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}.metric{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fbfcfd}.metric b{display:block;font-size:21px;line-height:1.1;margin-bottom:3px}.metric span{color:var(--muted);font-size:12px}.now{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.now-output{font-family:Consolas,"Microsoft YaHei",monospace;font-size:28px;font-weight:800;line-height:1.2;min-height:38px}.hint{color:var(--muted);font-size:12px;line-height:1.6;margin:10px 0 0}.table-panel{overflow:hidden}.toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);background:#fbfcfd}.toolbar strong{font-size:15px}.data-list{max-height:calc(100vh - 160px);overflow:auto;padding:8px}.row{display:grid;grid-template-columns:52px 72px 72px;gap:12px;align-items:center;min-height:38px;padding:6px 9px;border-radius:6px;font-family:Consolas,"Microsoft YaHei",monospace;font-size:17px;border:1px solid transparent}.row:nth-child(6n){margin-bottom:8px}.row.active{background:var(--active);border-color:#e0bd3c}.row.done{color:var(--muted)}.toast{min-height:20px;margin-top:10px;color:#2f7d32;font-size:13px}@media(max-width:840px){main{width:min(100% - 20px,680px);padding-top:14px}header{display:block}.layout{grid-template-columns:1fr}.controls{position:static}.data-list{max-height:none}.row{grid-template-columns:44px 60px 60px;gap:8px;font-size:16px}}
  </style>
</head>
<body>
  <main>
    <header><div><h1>&#26041;&#20301;&#22280;&#39134;&#34892;&#36335;&#24452;&#25773;&#25253;&#22120; Demo</h1><p class="sub">&#29983;&#25104; 6 &#26550;&#39134;&#26426;&#36335;&#24452;&#65292;&#25353; 12 &#32452;/&#20998;&#38047;&#36880;&#20301;&#25773;&#25253;&#12290;</p></div></header>
    <section class="layout">
      <aside class="panel controls">
        <div class="field"><label for="countInput">&#29983;&#25104;&#32452;&#25968;</label><input id="countInput" type="number" min="6" max="600" step="6" value="120"></div>
        <div class="field"><label for="rateInput">&#27599;&#20998;&#38047;&#25773;&#25253;&#32452;&#25968;</label><input id="rateInput" type="number" min="1" max="60" step="1" value="12"></div>
        <div class="field"><label for="voiceSelect">&#35821;&#38899;</label><select id="voiceSelect"></select></div>
        <div class="field"><label for="speedInput">&#35821;&#36895;</label><input id="speedInput" type="range" min="0.7" max="1.3" step="0.05" value="0.95"></div>
        <button id="generateBtn" class="primary" type="button">&#37325;&#26032;&#29983;&#25104;</button>
        <div class="button-row"><button id="playBtn" type="button">&#25773;&#25918;</button><button id="pauseBtn" type="button" disabled>&#26242;&#20572;</button><button id="stopBtn" class="danger" type="button" disabled>&#20572;&#27490;</button><button id="copyBtn" type="button">&#22797;&#21046;&#25968;&#25454;</button></div>
        <div class="status"><div class="metric"><b id="progressText">0/120</b><span>&#25773;&#25253;&#36827;&#24230;</span></div><div class="metric"><b id="paceText">5.0s</b><span>&#27599;&#32452;&#38388;&#38548;</span></div></div>
        <div class="now"><label>&#24403;&#21069;&#25773;&#25253;</label><div id="nowOutput" class="now-output">-- --- ---</div><p class="hint">&#25773;&#25253;&#35835;&#27861;&#65306;&#27934;&#12289;&#24186;&#12289;&#20004;&#12289;&#21441;&#12289;&#32902;&#12289;&#20237;&#12289;&#20845;&#12289;&#25348;&#12289;&#25420;&#12289;&#21246;&#12290;&#27599;&#32452;&#20869;&#37096;&#30701;&#20572;&#39039;&#65292;&#32452;&#38388;&#25353;&#33410;&#22863;&#34917;&#36275;&#31561;&#24453;&#12290;</p><div id="toast" class="toast" role="status" aria-live="polite"></div></div>
      </aside>
      <section class="panel table-panel"><div class="toolbar"><strong>&#36335;&#24452;&#25968;&#25454;</strong><span id="summaryText" class="sub"></span></div><div id="dataList" class="data-list" aria-live="polite"></div></section>
    </section>
  </main>
<script>
const planeIds=["01","02","03","41","42","43"];
const digitWords={"0":"\u6d1e","1":"\u5e7a","2":"\u4e24","3":"\u53c1","4":"\u8086","5":"\u4f0d","6":"\u516d","7":"\u62d0","8":"\u634c","9":"\u52fe"};
const els={countInput:document.getElementById("countInput"),rateInput:document.getElementById("rateInput"),voiceSelect:document.getElementById("voiceSelect"),speedInput:document.getElementById("speedInput"),generateBtn:document.getElementById("generateBtn"),playBtn:document.getElementById("playBtn"),pauseBtn:document.getElementById("pauseBtn"),stopBtn:document.getElementById("stopBtn"),copyBtn:document.getElementById("copyBtn"),progressText:document.getElementById("progressText"),paceText:document.getElementById("paceText"),nowOutput:document.getElementById("nowOutput"),toast:document.getElementById("toast"),dataList:document.getElementById("dataList"),summaryText:document.getElementById("summaryText")};
let rows=[],voices=[],currentIndex=0,playing=false,paused=false,timerId=0,lastActive=null;
function pad3(v){return String(Math.round(v)).padStart(3,"0")}function clamp(v,min,max){return Math.max(min,Math.min(max,v))}function randomInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function buildInitialBearings(){const first=randomInt(5,24);const gaps=Array.from({length:5},()=>randomInt(48,60));const bearings=[first];for(const gap of gaps)bearings.push(bearings[bearings.length-1]+gap);return bearings}
function generateData(){stopPlayback(false);const requested=Number(els.countInput.value)||120;const total=Math.max(6,Math.round(requested/6)*6);els.countInput.value=total;const rounds=total/6;const bearings=buildInitialBearings();const distances=Array.from({length:6},()=>randomInt(50,300));const bearingDrift=randomInt(-4,4)||3;const bearingSteps=Array.from({length:6},()=>bearingDrift+randomInt(-1,1));const distanceSteps=Array.from({length:6},()=>{const direction=Math.random()>.5?1:-1;return direction*randomInt(6,17)});rows=[];for(let round=0;round<rounds;round++){for(let i=0;i<6;i++){if(round>0){bearings[i]=clamp(bearings[i]+bearingSteps[i]+randomInt(-1,1),0,360);if(i>0&&bearings[i]<=bearings[i-1]+8)bearings[i]=clamp(bearings[i-1]+randomInt(10,16),0,360);distances[i]=clamp(distances[i]+distanceSteps[i]+randomInt(-5,5),50,300);if(distances[i]===50||distances[i]===300)distanceSteps[i]*=-1}rows.push({plane:planeIds[i],bearing:Math.round(bearings[i]),distance:Math.round(distances[i])})}}currentIndex=0;renderRows();updateStatus();showToast("\\u5df2\\u751f\\u6210 "+rows.length+" \\u7ec4")}
function formatRow(row){return `${row.plane} ${pad3(row.bearing)} ${pad3(row.distance)}`}
function renderRows(){els.dataList.innerHTML=rows.map((row,index)=>`<div class="row" data-index="${index}"><span>${row.plane}</span><span>${pad3(row.bearing)}</span><span>${pad3(row.distance)}</span></div>`).join("");els.summaryText.textContent=`${rows.length} \\u7ec4\\uFF0C${rows.length/6} \\u8f6e`}
function digitsToSpeech(text){return text.replace(/\d/g,d=>`${digitWords[d]} `).trim()}function rowSpeech(row){return [digitsToSpeech(row.plane),digitsToSpeech(pad3(row.bearing)),digitsToSpeech(pad3(row.distance))].join("\uFF0C ")}
function getIntervalMs(){const perMinute=clamp(Number(els.rateInput.value)||12,1,60);return 60000/perMinute}function getSelectedVoice(){const selected=els.voiceSelect.value;return voices.find(v=>v.name===selected)||voices.find(v=>v.lang.startsWith("zh"))||null}
function speak(text){return new Promise(resolve=>{if(!("speechSynthesis" in window)){resolve();return}const u=new SpeechSynthesisUtterance(text);const voice=getSelectedVoice();if(voice)u.voice=voice;u.lang=voice?voice.lang:"zh-CN";u.rate=Number(els.speedInput.value)||.95;u.pitch=1;u.onend=resolve;u.onerror=resolve;window.speechSynthesis.speak(u)})}
async function playLoop(){if(!playing||paused)return;if(currentIndex>=rows.length){stopPlayback(true);showToast("\\u64ad\\u62a5\\u5b8c\\u6210");return}const startedAt=performance.now();const row=rows[currentIndex];setActive(currentIndex);els.nowOutput.textContent=formatRow(row);updateStatus();await speak(rowSpeech(row));if(!playing||paused)return;currentIndex+=1;updateStatus();const wait=Math.max(250,getIntervalMs()-(performance.now()-startedAt));timerId=window.setTimeout(playLoop,wait)}
function setActive(index){if(lastActive){lastActive.classList.remove("active");lastActive.classList.add("done")}const node=els.dataList.querySelector(`[data-index="${index}"]`);if(node){node.classList.add("active");node.classList.remove("done");node.scrollIntoView({block:"center",behavior:"smooth"})}lastActive=node}
function updateStatus(){els.progressText.textContent=`${Math.min(currentIndex,rows.length)}/${rows.length}`;els.paceText.textContent=`${(getIntervalMs()/1000).toFixed(1)}s`;els.playBtn.disabled=playing&&!paused;els.pauseBtn.disabled=!playing;els.stopBtn.disabled=!playing&&currentIndex===0;els.pauseBtn.textContent=paused?"\\u7ee7\\u7eed":"\\u6682\\u505c"}
function startPlayback(){if(!rows.length)generateData();if("speechSynthesis" in window)window.speechSynthesis.cancel();playing=true;paused=false;showToast("");updateStatus();playLoop()}function togglePause(){if(!playing)return;if(paused){paused=false;updateStatus();playLoop()}else{paused=true;window.clearTimeout(timerId);if("speechSynthesis" in window)window.speechSynthesis.cancel();updateStatus()}}
function stopPlayback(completed){playing=false;paused=false;window.clearTimeout(timerId);if("speechSynthesis" in window)window.speechSynthesis.cancel();if(!completed)currentIndex=0;if(lastActive)lastActive.classList.remove("active");lastActive=null;els.nowOutput.textContent="-- --- ---";updateStatus()}
async function copyData(){const text=rows.map(formatRow).join("\n");try{await navigator.clipboard.writeText(text);showToast("\\u6570\\u636e\\u5df2\\u590d\\u5236")}catch{const area=document.createElement("textarea");area.value=text;document.body.appendChild(area);area.select();document.execCommand("copy");area.remove();showToast("\\u6570\\u636e\\u5df2\\u590d\\u5236")}}
function showToast(msg){els.toast.textContent=msg}function loadVoices(){if(!("speechSynthesis" in window)){els.voiceSelect.innerHTML="<option>\\u5f53\\u524d\\u6d4f\\u89c8\\u5668\\u4e0d\\u652f\\u6301\\u8bed\\u97f3\\u64ad\\u62a5</option>";return}voices=window.speechSynthesis.getVoices();const zh=voices.filter(v=>v.lang.toLowerCase().startsWith("zh"));const choices=zh.length?zh:voices;els.voiceSelect.innerHTML=choices.map(v=>`<option value="${v.name}">${v.name} (${v.lang})</option>`).join("")}
els.generateBtn.addEventListener("click",generateData);els.playBtn.addEventListener("click",startPlayback);els.pauseBtn.addEventListener("click",togglePause);els.stopBtn.addEventListener("click",()=>stopPlayback(false));els.copyBtn.addEventListener("click",copyData);els.rateInput.addEventListener("input",updateStatus);loadVoices();if("speechSynthesis" in window)window.speechSynthesis.onvoiceschanged=loadVoices;generateData();
</script>
</body>
</html>
